name: Update README Issues

on:
  issues:
    types:
      - opened
      - edited
      - closed
      - reopened
      - labeled
      - unlabeled
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: update-readme-issues
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Update open issue lists
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                state: "open",
                per_page: 100,
                sort: "created",
                direction: "asc"
              }
            );

            const realIssues = issues.filter(issue => !issue.pull_request);

            function labelsOf(issue) {
              return issue.labels.map(label =>
                typeof label === "string" ? label : label.name
              );
            }

            const priorityOrder = {
              "priority: critical": 0,
              "priority: high": 1,
              "priority: medium": 2,
              "priority: low": 3
            };

            function issuePriority(issue) {
              const labels = labelsOf(issue);

              for (const [label, order] of Object.entries(priorityOrder)) {
                if (labels.includes(label)) {
                  return order;
                }
              }

              return 4;
            }

            const bugs = realIssues
              .filter(issue => labelsOf(issue).includes("bug"))
              .sort((a, b) => {
                const priorityDifference =
                  issuePriority(a) - issuePriority(b);

                if (priorityDifference !== 0) {
                  return priorityDifference;
                }

                return a.number - b.number;
              });

            const ideas = realIssues
              .filter(issue => labelsOf(issue).includes("idea"))
              .sort((a, b) => a.number - b.number);

            function formatIssue(issue, includePriority) {
              const labels = labelsOf(issue);

              let suffix = "";

              if (includePriority) {
                const priority = labels.find(label =>
                  label.startsWith("priority:")
                );

                if (priority) {
                  suffix += ` \`${priority}\``;
                }

                if (labels.includes("needs logs")) {
                  suffix += " `needs logs`";
                }
              }

              return `- [#${issue.number}](${issue.html_url}) ${issue.title}${suffix}`;
            }

            const bugBlock = bugs.length
              ? bugs.map(issue => formatIssue(issue, true)).join("\n")
              : "_No open bug reports._";

            const ideaBlock = ideas.length
              ? ideas.map(issue => formatIssue(issue, false)).join("\n")
              : "_No open ideas._";

            const readmeResponse =
              await github.rest.repos.getContent({
                owner,
                repo,
                path: "README.md"
              });

            const readmeFile = readmeResponse.data;

            if (Array.isArray(readmeFile) || !readmeFile.content) {
              core.setFailed("README.md was not found.");
              return;
            }

            let readme = Buffer.from(
              readmeFile.content,
              "base64"
            ).toString("utf8");

            function replaceBlock(
              source,
              startMarker,
              endMarker,
              replacement
            ) {
              const start = source.indexOf(startMarker);
              const end = source.indexOf(endMarker);

              if (start === -1 || end === -1 || end < start) {
                throw new Error(
                  `README markers were not found: ${startMarker}`
                );
              }

              const before =
                source.slice(0, start + startMarker.length);

              const after = source.slice(end);

              return `${before}\n${replacement}\n${after}`;
            }

            readme = replaceBlock(
              readme,
              "<!-- BUGS-LIST:START -->",
              "<!-- BUGS-LIST:END -->",
              bugBlock
            );

            readme = replaceBlock(
              readme,
              "<!-- IDEAS-LIST:START -->",
              "<!-- IDEAS-LIST:END -->",
              ideaBlock
            );

            const currentReadme = Buffer.from(
              readmeFile.content,
              "base64"
            ).toString("utf8");

            if (readme === currentReadme) {
              core.info("README is already up to date.");
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: "README.md",
              message: "Update open Pocket Alchemy issues",
              content: Buffer.from(readme).toString("base64"),
              sha: readmeFile.sha
            });
